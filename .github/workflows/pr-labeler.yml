name: PR Labeler

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  label:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Apply Labels
        uses: actions/labeler@v6
        with:
          sync-labels: true
